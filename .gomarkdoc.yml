# gomarkdoc configuration for motion-tools
# See https://github.com/princjef/gomarkdoc for more options

# Output is set per-target by the Makefile (writes into docs/src/content/docs/api/).
# Standalone `gomarkdoc ./<pkg>` invocations write to stdout.

# Repository configuration for source code links
repository:
  url: https://github.com/viamrobotics/visualization
  defaultBranch: main
  # Path prefix will be automatically determined per package

# Include unexported symbols (set to true if you want internal documentation too)
includeUnexported: false

# Format for function/method signatures
format: github

# Embed files in output
embedFiles: false

# Check for broken links in documentation
check: false
# Header template (optional - uncomment to customize)
# header: |
#   # {{.Name}}
#
#   {{.Doc}}

# Footer template (optional - uncomment to add footer)
# footer: |
#   ---
#   Generated by [gomarkdoc](https://github.com/princjef/gomarkdoc)

