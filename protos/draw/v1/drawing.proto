syntax = "proto3";

package viam.motion_tools.draw.v1;

import "common/v1/common.proto";
import "draw/v1/metadata.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/viam-labs/motion-tools/gen/draw/v1;drawv1";

// Arrows represents a set of arrows in 3D space
// Metadata:
// - colors: float32 array of a single color: [r, g, b, a] or a color per arrow: [r, g, b, a, ...], defaults to [0, 1, 0, 0.7] (green)
message Arrows {
  // The poses of the arrows
  // float32 array of poses: [x, y, z, ox, oy, oz]
  bytes poses = 1;
}

// Line represents a line in 3D space
// Metadata:
// - colors: float32 array of a single color: [r, g, b, a] or two colors for lines and points: [r, g, b, a, r, g, b, a]
//   defaults to [0, 0.5, 1, 0.7] (blue) for lines, [0, 0.3, 0.8, 0.7] (darker blue) for points
message Line {
  // The points of the line
  // float32 array of positions: [x, y, z, ...]
  bytes points = 1;

  // optional width of the line in millimeters, defaults to 5
  optional float line_width = 2;

  // optional size of the dots in millimeters, defaults to 10
  optional float point_size = 3;
}

// Points represents a set of points in 3D space
// Metadata:
// - colors: float32 array of a single color: [r, g, b, a] or a color per point: [r, g, b, a, ...], defaults to [0.2, 0.2, 0.2, 0.7] (gray)
message Points {
  // The positions of the points
  // float32 array of positions: [x, y, z, ...]
  bytes positions = 1;

  // optional size of the points in millimeters, defaults to 10
  optional float point_size = 2;
}

// Model represents a 3D model in various formats
// Metadata:
// - colors: defaults to float32 array of no colors
message Model {
  // cache key for client-side caching
  optional string cache_key = 1;

  // expected file size in bytes (helpful for progress tracking)
  optional uint64 size_bytes = 2;

  // optional uniform scale factor, defaults to 1.0
  optional float scale = 3;

  // optional boolean to indicate if the model should animate
  optional bool animate = 4;

  oneof model_type {
    // URL to fetch the model from - preferred for large models
    string url = 5;
    // GLB (binary GLTF) file as bytes - preferred for small models
    bytes glb = 6;
  }
}

// Nurbs represents a NURBS curve in 3D space
// Metadata:
// - colors: float32 array of a single color: [r, g, b, a], defaults to [0, 1, 1, 0.7] (cyan)
message Nurbs {
  // The control points of the NURBS
  // []float32 of poses: [x, y, z, ox, oy, oz, theta, ...]
  bytes poses = 1;

  // The degree of the NURBS, defaults to 3
  int32 degree = 2;

  // The weights of the NURBS, defaults to [1, 1, 1, ...]
  // float32 array of weights: [weight, ...]
  bytes weights = 3;

  // The knots of the NURBS
  // float32 array of knots: [knot, ...]
  bytes knots = 4;
}

message Shape {
  // The center of the shape
  viam.common.v1.Pose center = 1;

  // The label of the shape
  string label = 2;

  // The type of the shape
  oneof geometry_type {
    Arrows arrows = 3;
    Line line = 4;
    Points points = 5;
    Model model = 6;
    Nurbs nurbs = 7;
  }
}

// For non-physical visualization shapes
message Drawing {
  // The name of the shape
  string name = 1;

  // The pose of the shape as observed through it's parent frame/the world
  viam.common.v1.PoseInFrame pose_in_observer_frame = 2;

  // The shape of the drawing
  optional Shape physical_object = 3;

  // The UUID of the shape
  bytes uuid = 4;

  // The metadata of the shape
  viam.motion_tools.draw.v1.Metadata metadata = 5;
}
