syntax = "proto3";

package draw.v1;

option go_package = "github.com/viam-labs/motion-tools/draw/v1;drawv1";

message Metadata {
  // Uint8Array of colors: [r, g, b, a, ...]
  // For simple objects, this is a single color of [r, g, b, a]
  // For complex objects, this is an array of colors of [r, g, b, a, ...]
  optional bytes colors = 1;

  reserved 2;
  reserved 3;

  // Whether to show the axes helper (RGB XYZ indicator) on the entity.
  // Defaults to false.
  optional bool show_axes_helper = 4;
}
