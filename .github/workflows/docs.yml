name: Deploy Docs

on:
  push:
    branches: [main]
  # Allow manual redeploys (e.g. after tweaking workflow itself).
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: 'latest'

      - name: Install gomarkdoc
        run: |
          go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install root deps
        run: pnpm install

      - name: Generate protobufs
        run: |
          make proto-vendor
          make proto-gen-go
          make proto-gen-ts

      - name: Build docs site
        working-directory: docs
        env:
          DOCS_BASE: /visualization/
          DOCS_SITE: https://viamrobotics.github.io
        run: pnpm build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/dist
          publish_branch: gh-pages
          # Preserves pr-preview/* directories deployed by pr-preview.yml.
          keep_files: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: 'docs: deploy ${{ github.sha }}'
