name: Create Version Bump PR

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to bump to (e.g., 1.2.3)'
        required: true
        type: string
    secrets:
      APP_REPO_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to bump to (e.g., 1.2.3)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout motion-tools repo (for changelog)
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Checkout app repository
        uses: actions/checkout@v4
        with:
          repository: viamrobotics/app
          token: ${{ secrets.APP_REPO_TOKEN }}
          path: app-repo

      - name: Install yq for YAML manipulation
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Read current version from pnpm-workspace.yaml
        id: current-version
        working-directory: app-repo
        run: |
          CURRENT_VERSION=$(yq eval '.catalog."@viamrobotics/motion-tools"' pnpm-workspace.yaml)

          if [ "$CURRENT_VERSION" = "null" ] || [ -z "$CURRENT_VERSION" ]; then
            echo "Warning: @viamrobotics/motion-tools not found in catalog"
            echo "current_version=not_found" >> $GITHUB_OUTPUT
            echo "skip_pr=false" >> $GITHUB_OUTPUT
          else
            echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "Current version in app repo: $CURRENT_VERSION"
            NEW_VERSION="${{ inputs.version }}"
            if [ "$CURRENT_VERSION" = "$NEW_VERSION" ]; then
              echo "Version is already up to date, skipping PR creation"
              echo "skip_pr=true" >> $GITHUB_OUTPUT
            else
              echo "skip_pr=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Update version in pnpm-workspace.yaml catalog
        if: steps.current-version.outputs.skip_pr != 'true'
        working-directory: app-repo
        run: |
          NEW_VERSION="${{ inputs.version }}"
          yq eval ".catalog.\"@viamrobotics/motion-tools\" = \"$NEW_VERSION\"" -i pnpm-workspace.yaml
          echo "Updated pnpm-workspace.yaml catalog:"
          yq eval '.catalog."@viamrobotics/motion-tools"' pnpm-workspace.yaml

      - name: Extract changelog from previous to new version
        if: steps.current-version.outputs.skip_pr != 'true'
        id: changelog
        run: |
          NEW_VERSION="${{ inputs.version }}"
          PREV_VERSION="${{ steps.current-version.outputs.current_version }}"

          echo "Extracting changelog from $PREV_VERSION to $NEW_VERSION"
          CHANGELOG=$(sed -n "/^## $NEW_VERSION$/,/^## $PREV_VERSION$/p" CHANGELOG.md | sed '$d' || echo "")

          if [ -n "$CHANGELOG" ]; then
            echo "Found changelog entries from $PREV_VERSION to $NEW_VERSION"
            echo "$CHANGELOG" > /tmp/changelog.txt
            {
              echo 'changelog<<EOF'
              cat /tmp/changelog.txt
              echo EOF
            } >> "$GITHUB_OUTPUT"
          else
            echo "No changelog found between versions $PREV_VERSION and $NEW_VERSION"
            echo "changelog=_No changelog entries found_" >> $GITHUB_OUTPUT
          fi

      - name: Find and close existing motion-tools bump PRs
        if: steps.current-version.outputs.skip_pr != 'true'
        id: find-existing-prs
        working-directory: app-repo
        env:
          GH_TOKEN: ${{ secrets.APP_REPO_TOKEN }}
        run: |
          NEW_VERSION="${{ inputs.version }}"
          EXISTING_PR_NUMBERS=$(gh pr list --repo viamrobotics/app --state open --json number,headRefName --jq '.[] | select(.headRefName | startswith("chore/bump-motion-tools-")) | .number' | tr '\n' ' ' || echo "")
          EXISTING_PRS=$(gh pr list --repo viamrobotics/app --state open --json number,headRefName --jq '.[] | select(.headRefName | startswith("chore/bump-motion-tools-")) | "\(.number):\(.headRefName)"' || echo "")

          if [ -n "$EXISTING_PRS" ]; then
            echo "Found existing PRs to close:"
            echo "$EXISTING_PRS"
            echo "pr_numbers=$EXISTING_PR_NUMBERS" >> $GITHUB_OUTPUT
            
            while IFS=: read -r PR_NUMBER BRANCH_NAME; do
              if [ -n "$PR_NUMBER" ] && [ -n "$BRANCH_NAME" ]; then
                echo "Closing PR #$PR_NUMBER (branch: $BRANCH_NAME)"
                gh pr close "$PR_NUMBER" --repo viamrobotics/app --comment "Closing this PR as a new version bump PR is being created for @viamrobotics/motion-tools $NEW_VERSION" || true
                
                echo "Deleting branch $BRANCH_NAME"
                git push origin --delete "$BRANCH_NAME" || true
              fi
            done <<< "$EXISTING_PRS"
          else
            echo "No existing motion-tools bump PRs found"
            echo "pr_numbers=" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies in app repo
        if: steps.current-version.outputs.skip_pr != 'true'
        working-directory: app-repo
        run: |
          pnpm install --no-frozen-lockfile --no-strict-peer-dependencies
          echo "Dependencies installed and lock file updated"

      - name: Create Pull Request in app repo
        if: steps.current-version.outputs.skip_pr != 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.APP_REPO_TOKEN }}
          path: app-repo
          commit-message: 'chore: bump @viamrobotics/motion-tools to ${{ inputs.version }}'
          title: 'chore: bump @viamrobotics/motion-tools to ${{ inputs.version }}'
          body: |
            This PR automatically bumps the version of `@viamrobotics/motion-tools` to `${{ inputs.version }}`.

            ${{ steps.changelog.outputs.changelog }}

            ---
            📦 Published: https://www.npmjs.com/package/@viamrobotics/motion-tools/v/${{ inputs.version }}
          branch: chore/bump-motion-tools-${{ inputs.version }}
          delete-branch: true
          add-paths: |
            pnpm-workspace.yaml
            pnpm-lock.yaml
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>

      - name: Link closed PRs to new PR
        if: steps.current-version.outputs.skip_pr != 'true' && steps.find-existing-prs.outputs.pr_numbers != ''
        working-directory: app-repo
        env:
          GH_TOKEN: ${{ secrets.APP_REPO_TOKEN }}
        run: |
          NEW_VERSION="${{ inputs.version }}"
          NEW_PR_NUMBER="${{ steps.create-pr.outputs.pull-request-number }}"

          if [ -z "$NEW_PR_NUMBER" ] || [ "$NEW_PR_NUMBER" = "null" ]; then
            BRANCH_NAME="chore/bump-motion-tools-$NEW_VERSION"
            NEW_PR_NUMBER=$(gh pr list --repo viamrobotics/app --head "$BRANCH_NAME" --json number --jq '.[0].number' || echo "")
          fi

          if [ -n "$NEW_PR_NUMBER" ] && [ "$NEW_PR_NUMBER" != "null" ]; then
            CLOSED_PR_NUMBERS="${{ steps.find-existing-prs.outputs.pr_numbers }}"
            
            for OLD_PR_NUMBER in $CLOSED_PR_NUMBERS; do
              echo "Adding link comment to closed PR #$OLD_PR_NUMBER"
              gh pr comment "$OLD_PR_NUMBER" --repo viamrobotics/app --body "🔗 Superseded by #$NEW_PR_NUMBER" || true
            done
          else
            echo "Could not determine new PR number, skipping link comments"
          fi

      - name: Request review from team-viz
        if: steps.current-version.outputs.skip_pr != 'true'
        continue-on-error: true
        working-directory: app-repo
        env:
          GH_TOKEN: ${{ secrets.APP_REPO_TOKEN }}
        run: |
          NEW_VERSION="${{ inputs.version }}"
          PR_NUMBER="${{ steps.create-pr.outputs.pull-request-number }}"

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            BRANCH_NAME="chore/bump-motion-tools-$NEW_VERSION"
            PR_NUMBER=$(gh pr list --repo viamrobotics/app --head "$BRANCH_NAME" --json number --jq '.[0].number' || echo "")
          fi

          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            echo "Requesting review from team-viz for PR #$PR_NUMBER"
            
            # Note: This requires the APP_REPO_TOKEN to have permissions to:
            # 1. Read organization members and teams
            # 2. Request reviewers on pull requests
            # The team slug should be just "team-viz"
            
            if gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/viamrobotics/app/pulls/$PR_NUMBER/requested_reviewers" \
              -f team_reviewers[]='team-viz' 2>&1; then
              echo "✓ Successfully requested review from team-viz"
            else
              echo "⚠ Failed to request review from team-viz"
              echo "This may require:"
              echo "  - PAT with 'read:org' scope to access team information"
              echo "  - The token owner must be a member of the organization"
              echo "  - The team 'team-viz' must exist and have access to the repository"
              echo ""
              echo "You can manually add the team as a reviewer on the PR:"
              echo "https://github.com/viamrobotics/app/pull/$PR_NUMBER"
            fi
          else
            echo "Warning: Could not determine PR number, skipping review request"
          fi
