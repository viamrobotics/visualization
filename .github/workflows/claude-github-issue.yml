name: Claude GitHub Issue

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: read

jobs:
  call-github-issue:
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    if: >-
      github.repository_owner == 'viamrobotics' && (
        (
          github.event_name == 'issues' &&
          contains(github.event.issue.body, '@claude') &&
          (
            contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association) ||
            github.event.issue.user.login == 'github-actions[bot]' ||
            github.event.issue.user.login == 'claude[bot]'
          )
        ) ||
        (
          github.event_name == 'issue_comment' &&
          !github.event.issue.pull_request &&
          contains(github.event.comment.body, '@claude') &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
        )
      )
    # viamrobotics/claude-ci-workflows@v1.17.3
    uses: viamrobotics/claude-ci-workflows/.github/workflows/claude-github-issue.yml@3ad96b0ccbb5ee0d7e2cde98653fae0c453e68bb
    with:
      issue_number: ${{ github.event.issue.number }}
      title: ${{ github.event.issue.title }}
      body: ${{ github.event.issue.body }}
      issue_author: ${{ github.event.issue.user.login }}
      install_command: |
        NODE24_BIN=$(ls -d /opt/hostedtoolcache/node/24.*/x64/bin | tail -1)
        echo "$NODE24_BIN" >> "$GITHUB_PATH"
        export PATH="$NODE24_BIN:$PATH"
        corepack enable
        pnpm install
      task_complexity: small
      allowed_tools: 'Edit,Read,Write,Glob,Grep,WebFetch,Bash(pnpm *),Bash(npx *),Bash(node *),Bash(go test *),Bash(go build *),Bash(go vet *),Bash(make *),Bash(ls *),Bash(find *),Bash(git config *),Bash(git add *),Bash(git commit *),Bash(git push *),Bash(git status*),Bash(git diff*),Bash(git log*),Bash(git checkout *),Bash(git branch *),Bash(git rev-parse *),Bash(git fetch *),Bash(gh pr create*),Bash(gh pr edit*),Bash(gh pr view*),Bash(gh pr diff*),Bash(gh issue comment*),Bash(gh issue view*),Bash(gh run view*),Bash(gh run list*),Bash(gh api *)'
      extra_prompt: |
        - If the issue is unclear, missing critical detail, or you need a decision from the reporter before you can proceed, DO NOT open a PR. Instead, post ONE comment on the issue using `gh issue comment ${{ github.event.issue.number }}` that:
          - Opens by tagging the reporter with `@${{ github.event.issue.user.login }}`
          - Lists your specific questions as a bullet list (be concrete: which file, which behavior, which edge case)
          - States that you will resume once they reply with the needed info
          Then exit successfully without creating a branch or PR.
        - Otherwise, implement the issue following the standard flow: branch `claude/<short-desc>`, commit, push, open a PR with `Closes #${{ github.event.issue.number }}` in the body.
        - Every PR MUST include a new changeset file, committed alongside the code change:
          - Look at an existing changeset in `.changeset/` for the exact format.
          - Create a new file `.changeset/<short-kebab-description>.md` with frontmatter:
              ---
              '@viamrobotics/motion-tools': <patch|minor|major>
              ---
          - DO NOT edit `.changeset/config.json`, `.changeset/README.md`, or any pre-existing changeset file.
          - Choose patch for bug fixes/refactors, minor for new features/exports, major for breaking changes.
          - `git add` the new changeset file along with your code changes before committing.
        - Only run verification commands relevant to the files you changed:
          - Svelte / TS / JS files (.svelte, .ts, .js): `pnpm lint`, `pnpm check`, and `pnpm test`
          - Go files (.go): `go test ./draw/... -count=1`, `go test ./client/... -count=1`
        - Before editing code, read 1-2 similar functions or components in the same file or package to follow existing patterns and conventions.
        - This repo uses Svelte 5 runes and SvelteKit. Consult the Svelte MCP server when editing `.svelte` / `.svelte.ts` / `.svelte.js` files.
      extra_system_prompt: >-
        This is a Svelte 5 + SvelteKit TypeScript library (`@viamrobotics/motion-tools`) with Go backend packages (draw, client).
        TypeScript/Svelte code is verifiable with `pnpm lint`, `pnpm check`, and `pnpm test`.
        Go code is verifiable with `go test ./draw/... -count=1` and `go test ./client/... -count=1`.
        Do NOT modify `dist/**` (generated) or `pnpm-lock.yaml` (regenerated by pnpm).
        Do NOT edit existing files under `.changeset/**`, but MUST create a new changeset file for every PR.
        Package manager: pnpm. Node: 24.
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SLACK_AI_WORKFLOW_ALERT_WEBHOOK_URL: ${{ secrets.SLACK_AI_WORKFLOW_ALERT_WEBHOOK_URL }}
