name: Claude Jira Implementation

on:
  repository_dispatch:
    types: [jira-ticket]
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Jira ticket ID (e.g., MT-123)'
        required: true
      summary:
        description: 'Ticket summary'
        required: true
      description:
        description: 'Ticket description'
        required: true
      task_complexity:
        description: 'Task complexity: small (50 turns), medium (75), large (100)'
        required: false
        default: 'small'
        type: choice
        options:
          - small
          - medium
          - large
      assignee:
        description: 'Atlassian display name of the responsible engineer (e.g., "John Doe")'
        required: false
        default: ''
      assignee_email:
        description: 'Atlassian email of the responsible engineer'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  call-jira:
    permissions:
      actions: read
      contents: write
      pull-requests: write
      id-token: write
    # viamrobotics/claude-ci-workflows@v1.17.3
    uses: viamrobotics/claude-ci-workflows/.github/workflows/claude-jira.yml@3ad96b0ccbb5ee0d7e2cde98653fae0c453e68bb
    with:
      ticket_id: ${{ github.event.client_payload.ticket_id || inputs.ticket_id }}
      summary: ${{ github.event.client_payload.summary || inputs.summary }}
      description: ${{ github.event.client_payload.description || inputs.description }}
      task_complexity: ${{ github.event.client_payload.task_complexity || inputs.task_complexity || 'small' }}
      assignee: ${{ github.event.client_payload.assignee || inputs.assignee || '' }}
      assignee_email: ${{ github.event.client_payload.assignee_email || inputs.assignee_email || '' }}
      install_command: |
        NODE24_BIN=$(ls -d /opt/hostedtoolcache/node/24.*/x64/bin | tail -1)
        echo "$NODE24_BIN" >> "$GITHUB_PATH"
        export PATH="$NODE24_BIN:$PATH"
        corepack enable
        pnpm install
      jira_base_url: ${{ vars.JIRA_BASE_URL }}
      jira_user_email: ${{ vars.JIRA_USER_EMAIL }}
      allowed_tools: 'Edit,Read,Write,Glob,Grep,Bash(pnpm *),Bash(npx *),Bash(node *),Bash(go test *),Bash(go build *),Bash(go vet *),Bash(make *),Bash(ls *),Bash(find *),Bash(git config *),Bash(git add *),Bash(git commit *),Bash(git push *),Bash(git status*),Bash(git diff*),Bash(git log*),Bash(git checkout *),Bash(git branch *),Bash(git rev-parse *),Bash(git fetch *),Bash(gh pr create*),Bash(gh pr edit*),Bash(gh pr view*),Bash(gh pr diff*)'
      extra_prompt: |
        - Only run verification commands relevant to the files you changed:
          - Svelte / TS / JS files (.svelte, .ts, .js): `pnpm lint`, `pnpm check`, and `pnpm test`
          - Go files (.go): `go test ./draw/... -count=1`, `go test ./client/... -count=1`
          - Run `pnpm build` only if the issue is build-related.
        - Do NOT run unrelated commands, they waste turns and time.
        - If a test or lint command fails more than twice on the same issue, commit what you have, create the PR, and note the unresolved issue in the PR description.
        - Before editing code, read 1-2 similar functions or components in the same file or package to follow existing patterns and conventions.
        - This repo uses Svelte 5 runes and SvelteKit. Consult the Svelte MCP server when editing `.svelte` / `.svelte.ts` / `.svelte.js` files.
      extra_system_prompt: >-
        This is a Svelte 5 + SvelteKit TypeScript library (`@viamrobotics/motion-tools`) with Go backend packages (draw, client).
        TypeScript/Svelte code is verifiable with `pnpm lint`, `pnpm check`, and `pnpm test`.
        Go code is verifiable with `go test ./draw/... -count=1` and `go test ./client/... -count=1`.
        Do NOT modify `dist/**` (generated), `.changeset/**` (versioning), or `pnpm-lock.yaml` (regenerated by pnpm).
        Package manager: pnpm. Node: 24.
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CI_GITHUB_APP_ID: ${{ secrets.CI_GITHUB_APP_ID }}
      CI_GITHUB_APP_PRIVATE_KEY: ${{ secrets.CI_GITHUB_APP_PRIVATE_KEY }}
      SLACK_AI_WORKFLOW_ALERT_WEBHOOK_URL: ${{ secrets.SLACK_AI_WORKFLOW_ALERT_WEBHOOK_URL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
