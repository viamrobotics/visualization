name: Main

on:
  push:
    branches: [main]

permissions: write-all

jobs:
  deploy-and-publish:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install and Build 🔧
        run: |
          pnpm i
          pnpm run build

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # This expects you to have a script called release which does a build for your packages and calls changeset publish
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract version from package.json
        id: version
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Published version: $VERSION"

  generate-docs:
    runs-on: ubuntu-latest
    needs: deploy-and-publish

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install gomarkdoc
        run: go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@latest

      - name: Generate API Documentation
        run: |
          gomarkdoc ./draw -o ./draw/DOCS.md
          echo "Documentation generated at draw/DOCS.md"

      - name: Check for documentation changes
        id: check_changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [[ -n $(git status --porcelain draw/DOCS.md) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Documentation has been updated"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No documentation changes detected"
          fi

      - name: Commit and push documentation
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git add draw/DOCS.md
          git commit -m "docs: update draw package API documentation [skip ci]"
          git push origin main

  create-version-bump-pr:
    needs: deploy-and-publish
    if: needs.deploy-and-publish.outputs.published == 'true'
    uses: ./.github/workflows/create-version-bump-pr.yml
    with:
      version: ${{ needs.deploy-and-publish.outputs.version }}
    secrets:
      APP_REPO_TOKEN: ${{ secrets.APP_REPO_TOKEN }}
