name: Main

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  deploy-and-publish:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: 'latest'

      - name: Install and Build 🔧
        run: |
          pnpm i
          make proto-gen-ts
          pnpm run build

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # This expects you to have a script called release which does a build for your packages and calls changeset publish
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from package.json
        id: version
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Published version: $VERSION"

  generate-docs:
    runs-on: ubuntu-latest
    needs: deploy-and-publish

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Generate Documentation
        run: |
          go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@latest
          make docs

      - name: Create Pull Request for documentation updates
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'docs: update documentation'
          title: 'Update Docs'
          body: |
            This PR updates the project documentation.

            Auto-generated by the documentation workflow.
          branch: update-docs
          delete-branch: true

  create-version-bump-pr:
    needs: deploy-and-publish
    if: needs.deploy-and-publish.outputs.published == 'true'
    uses: ./.github/workflows/create-version-bump-pr.yml
    with:
      version: ${{ needs.deploy-and-publish.outputs.version }}
    secrets:
      APP_REPO_TOKEN: ${{ secrets.APP_REPO_TOKEN }}

  notify-slack:
    runs-on: ubuntu-latest
    needs: deploy-and-publish
    if: needs.deploy-and-publish.outputs.published == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ needs.deploy-and-publish.outputs.version }}"
          echo "Extracting changelog for version $VERSION"

          # Extract the changelog section for this specific version
          # Find the line starting with "## $VERSION" and extract until the next "## " line
          CHANGELOG=$(awk -v ver="## $VERSION" '
            $0 == ver { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md | sed '/^$/d')

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="No changelog entries found for this version."
          fi

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Slack notification to release channel
        uses: slackapi/slack-github-action@v2.1.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: C057799FCBA
            text: "`motion-tools` has been updated to v${{ needs.deploy-and-publish.outputs.version }}.\n\nChanges:\n\n${{ steps.changelog.outputs.changelog }}\n\nTo report any issues with this release, please respond to this thread and tag the `@viz-team`."
