name: Main

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  deploy-and-publish:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: 'latest'

      - name: Install and Build 🔧
        run: |
          pnpm i
          make proto-gen-ts
          pnpm build

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from package.json
        id: version
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Published version: $VERSION"

  generate-docs:
    runs-on: ubuntu-latest
    needs: deploy-and-publish

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Generate Documentation
        run: |
          go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@latest
          make docs

      - name: Create Pull Request for documentation updates
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'docs: update documentation'
          title: 'Update Docs'
          body: |
            This PR updates the project documentation.

            Auto-generated by the documentation workflow.
          branch: update-docs
          delete-branch: true

  bump-app-catalog:
    needs: deploy-and-publish
    if: needs.deploy-and-publish.outputs.published == 'true'
    permissions:
      contents: read
      issues: write
    uses: ./.github/workflows/bump-app-catalog.yml
    with:
      version: ${{ needs.deploy-and-publish.outputs.version }}
    secrets: inherit
