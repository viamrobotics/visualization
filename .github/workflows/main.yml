name: Main

on:
  push:
    branches: [main]

permissions: write-all

jobs:
  deploy-and-publish:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install and Build 🔧
        run: |
          pnpm i
          pnpm run build

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # This expects you to have a script called release which does a build for your packages and calls changeset publish
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract version from package.json
        id: version
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Published version: $VERSION"

  create-version-bump-pr:
    needs: deploy-and-publish
    if: needs.deploy-and-publish.outputs.published == 'true'
    uses: ./.github/workflows/create-version-bump-pr.yml
    with:
      version: ${{ needs.deploy-and-publish.outputs.version }}
    secrets:
      APP_REPO_TOKEN: ${{ secrets.APP_REPO_TOKEN }}
