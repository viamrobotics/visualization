name: Bump Version in App Repository

# This workflow automatically opens a PR in viamrobotics/app to bump the
# version of @viamrobotics/motion-tools in pnpm-workspace.yaml after a release tag is created.
# This triggers on git tag pushes (created by changeset publish), not GitHub Releases.

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v0.16.1, v1.0.0, etc.

permissions:
  contents: read
  pull-requests: write

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - name: Extract version from tag
        id: version
        run: |
          # Extract version from tag (e.g., refs/tags/v0.16.1 -> 0.16.1)
          # Remove 'refs/tags/v' prefix if present, or just 'refs/tags/' if no 'v' prefix
          VERSION=${GITHUB_REF#refs/tags/v}
          VERSION=${VERSION#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Checkout app repository
        uses: actions/checkout@v4
        with:
          repository: viamrobotics/app
          token: ${{ secrets.APP_REPO_TOKEN }}
          path: app-repo

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Read current version from pnpm-workspace.yaml
        id: current-version
        working-directory: app-repo
        run: |
          # Extract the current version of motion-tools from pnpm-workspace.yaml
          # Try multiple patterns to find the version
          CURRENT_VERSION=$(grep -A 2 "motion-tools" pnpm-workspace.yaml | grep -oP 'version:\s*["'\'']?\K[^"'\'']+' || \
            grep "motion-tools" pnpm-workspace.yaml | grep -oP '["'\'']\K[^"'\'']+(?=["'\''])' | head -1 || echo "")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version in app repo: $CURRENT_VERSION"

          # Check if version needs updating
          NEW_VERSION="${{ steps.version.outputs.version }}"
          if [ "$CURRENT_VERSION" = "$NEW_VERSION" ]; then
            echo "Version is already up to date, skipping PR creation"
            echo "skip_pr=true" >> $GITHUB_OUTPUT
          else
            echo "skip_pr=false" >> $GITHUB_OUTPUT
          fi

      - name: Update version in pnpm-workspace.yaml
        if: steps.current-version.outputs.skip_pr != 'true'
        working-directory: app-repo
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"

          # Install yq for YAML manipulation
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          # Update the version in pnpm-workspace.yaml
          # Handle different possible YAML structures:
          # 1. "@viamrobotics/motion-tools": { version: "x.x.x" }
          # 2. "@viamrobotics/motion-tools": "x.x.x"
          # 3. "@viamrobotics/motion-tools": { version: 'x.x.x' }

          # Try to update using yq (most reliable)
          if yq eval ".dependencies.\"@viamrobotics/motion-tools\".version = \"$NEW_VERSION\"" -i pnpm-workspace.yaml 2>/dev/null; then
            echo "Updated using yq (nested structure)"
          elif yq eval ".dependencies.\"@viamrobotics/motion-tools\" = \"$NEW_VERSION\"" -i pnpm-workspace.yaml 2>/dev/null; then
            echo "Updated using yq (direct version)"
          else
            # Fallback to sed for edge cases
            echo "Falling back to sed..."
            sed -i.bak -E "s|(@viamrobotics/motion-tools['\"]?:[[:space:]]*\{[[:space:]]*version:[[:space:]]*['\"])[^'\"]*(['\"])|\1$NEW_VERSION\2|g" pnpm-workspace.yaml || \
            sed -i.bak -E "s|(@viamrobotics/motion-tools['\"]?:[[:space:]]*['\"])[^'\"]*(['\"])|\1$NEW_VERSION\2|g" pnpm-workspace.yaml
            rm -f pnpm-workspace.yaml.bak
          fi

          # Verify the change
          echo "Updated pnpm-workspace.yaml:"
          grep -A 2 "motion-tools" pnpm-workspace.yaml || true

      - name: Install dependencies
        if: steps.current-version.outputs.skip_pr != 'true'
        working-directory: app-repo
        run: |
          pnpm install
          echo "Dependencies installed and lock file updated"

      - name: Find existing motion-tools bump PRs
        if: steps.current-version.outputs.skip_pr != 'true'
        id: find-existing-prs
        working-directory: app-repo
        env:
          GH_TOKEN: ${{ secrets.APP_REPO_TOKEN }}
        run: |
          # Authenticate GitHub CLI
          echo "$GH_TOKEN" | gh auth login --with-token

          # Find open PRs that bump motion-tools
          # Search for PRs with branch matching "chore/bump-motion-tools-*"
          EXISTING_PRS=$(gh pr list --repo viamrobotics/app --state open --json number,title,headRefName --jq '.[] | select(.headRefName | startswith("chore/bump-motion-tools-")) | .number' || echo "")

          if [ -n "$EXISTING_PRS" ]; then
            echo "Found existing PRs: $EXISTING_PRS"
            # Store PR numbers as a space-separated list
            echo "pr_numbers=$EXISTING_PRS" >> $GITHUB_OUTPUT
          else
            echo "No existing motion-tools bump PRs found"
            echo "pr_numbers=" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.current-version.outputs.skip_pr != 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.APP_REPO_TOKEN }}
          path: app-repo
          commit-message: 'chore: bump @viamrobotics/motion-tools to ${{ steps.version.outputs.version }}'
          title: 'chore: bump @viamrobotics/motion-tools to ${{ steps.version.outputs.version }}'
          body: |
            This PR automatically bumps the version of `@viamrobotics/motion-tools` to `${{ steps.version.outputs.version }}` after the release tag was created.

            **Previous version:** ${{ steps.current-version.outputs.current_version }}  
            **New version:** ${{ steps.version.outputs.version }}

            Tag: [${{ github.ref_name }}](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})
          branch: chore/bump-motion-tools-${{ steps.version.outputs.version }}
          delete-branch: true

      - name: Request review from team-viz
        if: steps.current-version.outputs.skip_pr != 'true'
        working-directory: app-repo
        env:
          GH_TOKEN: ${{ secrets.APP_REPO_TOKEN }}
        run: |
          # Authenticate GitHub CLI
          echo "$GH_TOKEN" | gh auth login --with-token

          NEW_VERSION="${{ steps.version.outputs.version }}"
          # Get PR number from action output (try both common output names)
          PR_NUMBER="${{ steps.create-pr.outputs.pr_number }}"
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            PR_NUMBER="${{ steps.create-pr.outputs.number }}"
          fi

          # If PR number not available from outputs, try to get it from the branch
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            BRANCH_NAME="chore/bump-motion-tools-$NEW_VERSION"
            PR_NUMBER=$(gh pr list --repo viamrobotics/app --head "$BRANCH_NAME" --json number --jq '.[0].number' || echo "")
          fi

          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            echo "Requesting review from team-viz for PR #$PR_NUMBER"
            # Request review from the team using GitHub API
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "/repos/viamrobotics/app/pulls/$PR_NUMBER/requested_reviewers" \
              -f team_reviewers='["team-viz"]' || echo "Warning: Failed to request review from team-viz"
          else
            echo "Warning: Could not determine PR number, skipping review request"
          fi

      - name: Close existing motion-tools bump PRs
        if: steps.current-version.outputs.skip_pr != 'true' && steps.find-existing-prs.outputs.pr_numbers != ''
        working-directory: app-repo
        env:
          GH_TOKEN: ${{ secrets.APP_REPO_TOKEN }}
        run: |
          # Authenticate GitHub CLI
          echo "$GH_TOKEN" | gh auth login --with-token

          NEW_VERSION="${{ steps.version.outputs.version }}"
          # Get PR number from action output (try both common output names)
          NEW_PR_NUMBER="${{ steps.create-pr.outputs.pr_number }}"
          if [ -z "$NEW_PR_NUMBER" ] || [ "$NEW_PR_NUMBER" = "null" ]; then
            NEW_PR_NUMBER="${{ steps.create-pr.outputs.number }}"
          fi

          # If PR number not available from outputs, try to get it from the branch
          if [ -z "$NEW_PR_NUMBER" ] || [ "$NEW_PR_NUMBER" = "null" ]; then
            BRANCH_NAME="chore/bump-motion-tools-$NEW_VERSION"
            NEW_PR_NUMBER=$(gh pr list --repo viamrobotics/app --head "$BRANCH_NAME" --json number --jq '.[0].number' || echo "")
          fi

          if [ -z "$NEW_PR_NUMBER" ] || [ "$NEW_PR_NUMBER" = "null" ]; then
            echo "Warning: Could not determine new PR number, closing old PRs without link"
            NEW_PR_URL=""
            COMMENT="This PR has been superseded by a new PR which bumps @viamrobotics/motion-tools to version $NEW_VERSION."
          else
            NEW_PR_URL="https://github.com/viamrobotics/app/pull/$NEW_PR_NUMBER"
            COMMENT="This PR has been superseded by #$NEW_PR_NUMBER which bumps @viamrobotics/motion-tools to version $NEW_VERSION.

            See: $NEW_PR_URL"
          fi

          EXISTING_PRS="${{ steps.find-existing-prs.outputs.pr_numbers }}"

          # Close each existing PR and add a comment linking to the new PR
          for PR_NUMBER in $EXISTING_PRS; do
            echo "Closing PR #$PR_NUMBER and linking to new PR #$NEW_PR_NUMBER"
            gh pr close "$PR_NUMBER" --repo viamrobotics/app --comment "$COMMENT"
          done
