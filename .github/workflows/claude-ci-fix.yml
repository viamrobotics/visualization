name: Claude CI Fix

on:
  workflow_run:
    workflows: ['Pull Request Checks']
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Failed workflow run ID (from gh run list)'
        required: true
      branch:
        description: 'PR branch name (e.g., claude/fix-something)'
        required: true

permissions:
  contents: read

jobs:
  call-ci-fix:
    permissions:
      contents: write
      pull-requests: write
      actions: read
      issues: write
      id-token: write
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'failure' &&
        startsWith(github.event.workflow_run.head_branch, 'claude/')
      )
    # viamrobotics/claude-ci-workflows@v1.17.3
    uses: viamrobotics/claude-ci-workflows/.github/workflows/claude-ci-fix.yml@3ad96b0ccbb5ee0d7e2cde98653fae0c453e68bb
    with:
      run_id: ${{ github.event.workflow_run.id || inputs.run_id }}
      branch: ${{ github.event.workflow_run.head_branch || inputs.branch }}
      install_command: |
        NODE24_BIN=$(ls -d /opt/hostedtoolcache/node/24.*/x64/bin | tail -1)
        echo "$NODE24_BIN" >> "$GITHUB_PATH"
        export PATH="$NODE24_BIN:$PATH"
        corepack enable
        pnpm install
      max_turns: 50
      team_mention: '@viamrobotics/team-viz'
      allowed_tools: 'Edit,Read,Write,Glob,Grep,WebFetch,Bash(pnpm *),Bash(npx *),Bash(node *),Bash(go test *),Bash(go build *),Bash(go vet *),Bash(make *),Bash(ls *),Bash(find *),Bash(git config *),Bash(git add *),Bash(git commit *),Bash(git push *),Bash(git status*),Bash(git diff*),Bash(git log*),Bash(git checkout *),Bash(git branch *),Bash(git rev-parse *),Bash(git fetch *),Bash(gh api *)'
      extra_prompt: |
        - Only run verification commands relevant to the files you changed:
          - Svelte / TS / JS files (.svelte, .ts, .js): `pnpm lint`, `pnpm check`, and `pnpm test`
          - Go files (.go): `go test ./draw/... -count=1`, `go test ./client/... -count=1`
          - Run `pnpm build` only if the issue is build-related.
        - Do NOT run unrelated commands, they waste turns and time.
        - If a lint or test command fails more than twice on the same issue, commit what you have, push, and note the unresolved issue in a PR comment.
        - Before editing code, read 1-2 similar functions or components in the same file or package to follow existing patterns and conventions.
        - This repo uses Svelte 5 runes and SvelteKit. Consult the Svelte MCP server when editing `.svelte` / `.svelte.ts` / `.svelte.js` files.
      extra_system_prompt: >-
        This is a Svelte 5 + SvelteKit TypeScript library (`@viamrobotics/motion-tools`) with Go backend packages (draw, client).
        TypeScript/Svelte code is verifiable with `pnpm lint`, `pnpm check`, and `pnpm test`.
        Go code is verifiable with `go test ./draw/... -count=1` and `go test ./client/... -count=1`.
        Do NOT modify `dist/**` (generated), `.changeset/**` (versioning), or `pnpm-lock.yaml` (regenerated by pnpm).
        Package manager: pnpm. Node: 24.
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GIT_ACCESS_TOKEN: ${{ secrets.GIT_ACCESS_TOKEN }}
