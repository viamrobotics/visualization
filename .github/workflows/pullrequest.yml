name: Pull Request Checks

on:
  pull_request:
    branches:
      - main
      - next

permissions: write-all

jobs:
  lint:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.event.pull_request.title, 'Version Packages') }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm 🔧
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint 💅
        run: pnpm run lint

  check:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.event.pull_request.title, 'Version Packages') }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm 🔧
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Generate protobuf
        run: make proto-gen-ts

      - name: Check
        run: pnpm run check

  test:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.event.pull_request.title, 'Version Packages') }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm 🔧
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.23.11
          cache: 'go'

      - name: Install protoc-gen-go and protoc-gen-go-grpc
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate protobuf
        run: |
          make proto-gen-ts
          make proto-gen-go

      - name: Test
        run: pnpm run test

      - name: Test Draw
        run: pnpm run test:draw

      - name: Test Coverage
        run: npx vitest run --coverage

      - name: Upload results to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
