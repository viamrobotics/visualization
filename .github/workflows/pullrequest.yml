name: Pull Request Checks

on:
  pull_request:
    branches:
      - main
      - next

permissions: write-all

jobs:
  proto-gen:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.event.pull_request.title, 'Version Packages') }}
    outputs:
      protos_changed: ${{ steps.check-protos.outputs.protos }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Check for proto changes
        id: check-protos
        uses: dorny/paths-filter@v3
        with:
          filters: |
            protos:
              - 'protos/**'

      - uses: pnpm/action-setup@v6
        name: Install pnpm 🔧
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23.11
          cache: true

      - name: Install protoc-gen-go and protoc-gen-connect-go
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate protos
        run: make proto

      - name: Check proto formatting
        run: make proto-format-check

      - name: Upload TypeScript proto artifacts
        uses: actions/upload-artifact@v4
        with:
          name: protos-ts
          path: |
            src/lib/buf/

      - name: Upload Go proto artifacts
        uses: actions/upload-artifact@v4
        with:
          name: protos-go
          path: draw/v1/

      - name: Commit generated Go protos
        if: steps.check-protos.outputs.protos == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add draw/v1/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automatically regenerated protobuf code"
            git push
          fi

  lint:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.event.pull_request.title, 'Version Packages') }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        name: Install pnpm 🔧
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23.11
          cache: true

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.11.0/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.11.0
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: pnpm install

      - name: Lint 💅
        run: pnpm lint

  check:
    runs-on: ubuntu-latest
    needs: proto-gen
    if: ${{ !startsWith(github.event.pull_request.title, 'Version Packages') }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        name: Install pnpm 🔧
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Download TypeScript proto artifacts
        uses: actions/download-artifact@v4
        with:
          name: protos-ts
          path: src/lib/buf/

      - name: Check
        run: pnpm check

  test:
    runs-on: ubuntu-latest
    needs: proto-gen
    if: ${{ !startsWith(github.event.pull_request.title, 'Version Packages') }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        name: Install pnpm 🔧
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm playwright install chromium --with-deps

      - name: Download TypeScript proto artifacts
        uses: actions/download-artifact@v4
        with:
          name: protos-ts
          path: src/lib/buf/

      - name: Test
        run: npx vitest run --coverage

      - name: Upload results to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  test-draw:
    runs-on: ubuntu-latest
    needs: proto-gen
    if: ${{ !startsWith(github.event.pull_request.title, 'Version Packages') }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23.11
          cache: true

      - name: Download Go proto artifacts
        uses: actions/download-artifact@v4
        with:
          name: protos-go
          path: draw/v1/

      - name: Test Draw
        run: go test ./draw/... -count=1
