version: v2
managed:
  enabled: false
plugins:
  # Go code generation
  - local: protoc-gen-go
    out: gen
    opt: paths=source_relative

  # TypeScript code generation (v1 - matches Viam SDK)
  - remote: buf.build/bufbuild/es:v1.10.0
    out: src/lib/gen
    opt:
      - target=ts
      - import_extension=none
    include_imports: true
